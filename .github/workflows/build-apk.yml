name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Java (for Gradle/Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds the React/Vite web app that Capacitor will wrap.
      # VITE_API_BASE_URL should be set as a repo/environment "Variable"
      # (Settings > Secrets and variables > Actions > Variables) once you have
      # a deployed backend. Leave it unset for now — the app will still build
      # and install, but network calls (login, dashboard data, etc.) won't
      # have a server to reach until that's set.
      - name: Build web app
        working-directory: artifacts/gas-monitor
        env:
          PORT: '5173'
          BASE_PATH: '/'
          VITE_API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: pnpm run build

      - name: Sync Capacitor Android project
        working-directory: artifacts/gas-monitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: artifacts/gas-monitor/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gas-monitor-debug-apk
          path: artifacts/gas-monitor/android/app/build/outputs/apk/debug/app-debug.apk
